# ce-db — Firestore-class realtime document database over CE. Installed + supervised by the one `ce` node via ce-appmgr.

[app]
name    = "ce-db"
version = "0.1.0"
summary = "Firestore-class document DB over CE: collections, field-merge CRDT, realtime watch, per-collection cap gating (CLI)."
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"

[native]
bin = "ce-db"
[native.artifacts]
"darwin-amd64" = "PLACEHOLDER_darwin_amd64"
"linux-amd64"  = "PLACEHOLDER_linux_amd64"

[deps]
# Drives the local ce node (ce-rs); CRDT convergence via ce-coord; cap gating via ce-iam-core.

[sandbox]
tier       = "none"
net        = "loopback"
capability = "inherit"

# No [daemon]: ce-db is a CLI (set/get/query/watch/grant/status/compact), not a long-running server.
